<!DOCTYPE html>
<html>
    <head>
        <title>Advanced Search Ultimate</title>
        <link red="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Advanced Search Ultimate</h1>

        <h2>Contains all of the following:</h2>
        <input type="text" id="all">

        <br>

        <h2>Contains this specific word/phrase:</h2>
        <input type="text" id="specific">

        <br>

        <h2>Does not contain:</h2>
        <input type="text" id="none">

        <br>

        <h2>Is found on the site (optional):</h2>
        <input type="text" id="site">

        <br>
        <br>

        <select id="searchEngine">
            <option>DuckDuckGo</option>
            <option>StartPage</option>
            <option>Google</option>
        </select>

        <br><br>

        <button onclick="search()">Search!</button>

        <script src="script.js"></script>
    </body>
</html>
